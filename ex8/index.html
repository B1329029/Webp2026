<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>景點觀光展覽資訊 - Ajax Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        table {
            font-family: Arial, Helvetica, sans-serif;
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px; 
        }

        td, th {
            border: 1px solid #ddd;
            padding: 8px; 
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        th {
            padding-top: 12px;
            padding-bottom: 12px;
            text-align: left;
            background-color: #04AA6D; 
            color: white;
        }
    </style>
</head>
<body>

    <div class="container mt-5">
        <h1>景點觀光展覽資訊</h1>
        
        <table id="csie">
            <thead>
                <tr>
                    <th style="width: 40%;">名稱</th>
                    <th style="width: 30%;">地點</th>
                    <th style="width: 30%;">票價</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <div class="mt-3">
            <button class="btn btn-primary" onclick="delOldData()">delOldData</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
